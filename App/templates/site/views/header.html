<header>
    <nav class="bg-black dark:bg-black shadow-md">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap items-center justify-between py-3">
                
                <!-- Logo -->
                <div class="text-xl font-bold text-white dark:text-white">
                    <img src="{{ url('App/templates/assets/img/logo.png') }}" alt="Logo" class="h-20 w-40 inline-block mr-2">
                </div>

                <!-- Botão mobile -->
                <button id="mobile-btn" class="md:hidden text-white dark:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>

                <!-- Links do menu -->
                <ul id="mobile-menu" class="hidden md:flex w-full md:w-auto flex-col md:flex-row gap-4 mt-4 md:mt-0">
                    <li><a href="{{ url('home') }}" class="block py-2 px-3 hover:text-yellow-400 hover:text-lg transition {{ rota_atual == 'home' ? 'text-white font-semibold' : 'text-gray-300 dark:text-gray-300' }}">Home</a></li>
                    <div class="relative inline-block">
    <!-- Dropdown Button -->
    <button class="px-4 py-2 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 hover:bg-gray-700 transition {{ rota_atual starts with 'categoria' ? 'text-white font-semibold' : 'text-gray-300 dark:text-gray-300' }}" aria-haspopup="true" aria-expanded="false">
        Categorias
        <svg class="inline-block w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
    </button>

    <!-- Dropdown Items -->
    <div class="absolute hidden mt-2 bg-white rounded-lg shadow-lg min-w-[200px] z-10">
        {% for category in categories %}
        <a href="{{ url('categoria/' ~ category.category_id) }}" class="block px-4 py-2 bg-gray-200 rounded-md text-gray-800 hover:bg-gray-400 aria-label="{{ category.category_name }}">{{category.category_name }}</a>
        {% endfor %}
    </div>
    </div>
                    <li><a href="{{ url('contato') }}" class="block py-2 px-3 hover:text-yellow-400 hover:text-lg transition {{ rota_atual == 'contato' ? 'text-white font-semibold' : 'text-gray-300 dark:text-gray-300' }}">Contato</a></li>
                    <li><a href="{{ url('loja') }}" class="block py-2 px-3 hover:text-yellow-400 hover:text-lg transition {{ rota_atual == 'loja' ? 'text-white font-semibold' : 'text-gray-300 dark:text-gray-300' }}">Loja</a></li>
                    <li><a href="{{ url('sobre') }}" class="block py-2 px-3 hover:text-yellow-400 hover:text-lg transition {{ rota_atual == 'sobre' ? 'text-white font-semibold' : 'text-gray-300 dark:text-gray-300' }}">Sobre</a></li>
                    <li class="relative">
                        <button id="search-toggle" type="button" class="flex items-center justify-center w-10 h-10 rounded-full border border-gray-500 text-gray-300 hover:text-white hover:border-yellow-400 transition focus:outline-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </button>
                        <div id="search-box" class="hidden absolute right-0 mt-2 w-full md:w-80 bg-black border border-gray-700 rounded-lg p-3 shadow-xl z-20">
                            <form id="searchForm" action="{{ url('busca') }}" method="get" data-search-url="{{ url('busca/ajax') }}" data-post-url="{{ url('post') }}" class="flex flex-col gap-2">
                                <div class="flex items-center gap-2">
                                    <input type="text" id="searchQuery" name="searchQuery" class="w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-3 py-2 focus:outline-none focus:border-yellow-400" placeholder="Buscar..." autocomplete="off">
                                    <button type="submit" class="inline-flex items-center justify-center px-3 py-2 bg-yellow-500 text-black font-semibold rounded-lg hover:bg-yellow-400 transition">Ir</button>
                                </div>
                                <div id="search-suggestions" class="hidden max-h-72 overflow-auto rounded-lg border border-gray-700 bg-gray-900 text-white"></div>
                            </form>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<script src="{{ url('App/templates/assets/js/header.js') }}"></script>
<script src="{{ url('App/templates/assets/js/search.js') }}"></script>
<script src="{{ url('App/templates/assets/js/dropdown.js') }}"></script>
