{% extends "template.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-500 to-purple-700 py-12 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-white mb-4">Contato</h1>
      <p class="text-lg text-purple-100">Entre em contato conosco</p>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <form>
        <div class="mb-4">
          <label for="name" class="block text-gray-700 font-medium mb-2">Nome</label>
          <input type="text" id="name" name="name" class="border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
          <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
          <input type="email" id="email" name="email" class="border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
          <label for="message" class="block text-gray-700 font-medium mb-2">Mensagem</label>
          <textarea id="message" name="message" rows="5" class="border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
          Enviar
        </button>
      </form>
    </div>
  </div>
</div>


{% endblock %}
