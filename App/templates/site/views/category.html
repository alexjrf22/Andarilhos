{% extends "template.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-500 to-purple-700 py-20 px-6 md:px-20 text-white -backdrop-hue-rotate-15">
    <div class="mx-auto max-w-7xl">
        <div class="flex flex-col gap-6 md:flex-row md:items-start">
            <div class="w-full md:w-4/5">
                <div class="mb-8">
                    <h1 class="text-4xl font-bold mb-4">{{ category.category_name }}</h1>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {% for post in posts %}
                    <div class="bg-white rounded-xl shadow-md p-6">
                        <h3 class="text-xl font-bold text-gray-800 mb-2"><a href="{{ url ('post/' ~ post.post_id) }}">{{ post.post_title }}</a></h3>
                        <p class="text-gray-600">{{ summarizeText(post.post_text, 100) }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div class="w-full md:w-1/5">
                {% include "sidebar.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
