{% extends"template.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-500 to-purple-700 py-20 px-6 md:px-20 text-white">
    <div class="mx-auto max-w-7xl">
        <div class="flex flex-col gap-6 md:flex-row md:items-start">
            <div class="w-full md:w-4/5 bg-white/10 rounded-3xl p-8 backdrop-blur-sm shadow-xl">
                <article class="prose prose-invert max-w-none">
                    <h1 class="text-4xl font-bold mb-6">{{ post.post_title }}</h1>
                    <div class="text-lg leading-relaxed">{{ post.post_text }}</div>
                </article>
            </div>
            <div class="w-full md:w-1/5">
                {% include "sidebar.html" %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
