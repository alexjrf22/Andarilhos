{% extends 'template.html' %}

{% block content %}
{% include 'header.html' %}
  <!-- Cabecalho -->
  <div class="bg-white shadow">
    <div class="container mx-auto px-6 py-4">
      <h1 class="text-2xl text-gray-800 font-bold">{{ category ? 'Editar Categoria' : 'Cadastro de Categorias' }}</h1>
    </div>
</div>

  <!-- Conteudo Principal -->
  <main class="container mx-auto px-6 py-8">
    <form action="{{ category ? url('/admin/categoria/editar/' ~ category.category_id) : url('/admin/categoria/cadastrar') }}" method="post" class="bg-white shadow rounded-lg p-4">
      <h2 class="text-lg text-gray-800 font-bold mb-4">{{ category ? 'Atualize os Dados da Categoria' : 'Informe os Dados da Categoria' }}</h2>

      <!-- Nome da categoria -->
      <div class="mb-6">
        <label for="category_name" class="block text-gray-700 text-sm font-medium mb-2">Nome da Categoria</label>
        <input type="text" id="category_name" name="category_name" value="{{ category.category_name }}" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
      </div>

      <!-- Descrição da categoria -->
      <div class="mb-6">
        <label for="description" class="block text-gray-700 text-sm font-medium mb-2">Descrição da Categoria</label>
        <textarea id="description" name="description" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">{{ category.category_description }}</textarea>
      </div>

      <!--Status-->
      <div class="mb-6">
        <label for="status" class="block text-gray-700 text-sm font-medium mb-2">Status</label>
        <select id="status" name="status" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-indigo-500">
          <option value="" disabled selected>Selecione um status</option>
          <option value="1" {{ category.category_status == 1 ? 'selected' : '' }}>Ativa</option>
          <option value="0" {{ category.category_status == 0 ? 'selected' : '' }}>Inativa</option>
        </select>
      </div>

      <!-- Botão de Envio -->
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
        {{ category ? 'Salvar Alterações' : 'Cadastrar Categoria' }}
      </button>
    </form>
  </main>
{% endblock %}
